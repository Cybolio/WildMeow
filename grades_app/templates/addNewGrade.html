<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WildMeow - Add New Grade</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4b0000 0%, #8b0000 50%, #b22222 100%);
            color: white;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 550px;
            padding: 20px;
        }

        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
        }

        .header-area h1 {
            font-size: 2rem;
        }

        .back-link {
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.7;
            transition: 0.3s;
        }

        .back-link:hover {
            opacity: 1;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            max-height: 85vh;
            overflow-y: auto;
        }

        form p {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 6px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="number"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 12px 18px;
            border-radius: 25px;
            border: none;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            outline: none;
            font-size: 0.95rem;
            transition: background 0.3s;
        }

        input:focus, select:focus {
            background: rgba(255, 255, 255, 0.2);
        }

        select option {
            background: #8b0000;
            color: white;
        }

        .btn-save {
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 0, 0.5);
        }

        .glass-card::-webkit-scrollbar {
            width: 6px;
        }
        .glass-card::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-area">
            <h1>Add New Grade</h1>
            <a href="{% url 'home' %}" class="back-link">← Back to Home</a>
        </div>

        <div class="glass-card">
            <form method="POST">
                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit" class="btn-save">Save Record</button>
            </form>
        </div>
    </div>

</body>
</html>

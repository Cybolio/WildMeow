<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WildMeow - Grades Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #4b0000 0%, #8b0000 50%, #b22222 100%);
            color: white;
            padding: 40px 20px;
        }

        .dashboard-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .logo-area h1 {
            font-size: 2.5rem;
            letter-spacing: -1px;
        }

        .logo-area span {
            font-size: 1rem;
            opacity: 0.7;
            display: block;
        }

        nav {
            display: flex;
            gap: 15px;
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        nav a:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .logout-link {
            background: linear-gradient(to right, #ff416c, #ff4b2b);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        h2 {
            margin-bottom: 25px;
            font-size: 1.8rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead tr {
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }

        th {
            padding: 15px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        td {
            padding: 15px;
            font-size: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .grade-badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 12px;
            border-radius: 10px;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
            .glass-panel {
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <header>
            <div class="logo-area">
                <h1>WildMeow 🐾</h1>
                <span>Student Academic Portal</span>
            </div>
            <nav>
                <a href="{% url 'edit_profile' %}">Edit Profile</a>
                <a href="{% url 'add_grade' %}">Add New Record</a>
                <a href="{% url 'logout' %}" class="logout-link">Log Off</a>
            </nav>
        </header>

        <main class="glass-panel">
            <h2>Grades Home</h2>

            <table>
                <thead>
                    <tr>
                        <th>Course</th>
                        <th>Grade</th>
                        <th>Semester</th>
                    </tr>
                </thead>
                <tbody>
                    {% for g in grades %}
                    <tr>
                        <td>{{ g.courses_offered }}</td>
                        <td><span class="grade-badge">{{ g.grades }}</span></td>
                        <td>{{ g.semester }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </main>
    </div>

</body>
</html>

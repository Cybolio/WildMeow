<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WildMeow - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4b0000 0%, #8b0000 50%, #b22222 100%);
            color: white;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-around;
            padding: 20px;
        }

        .welcome-text {
            flex: 1;
            padding-right: 40px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .welcome-text h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }

        .line {
            width: 60px;
            height: 4px;
            background: white;
            margin: 15px 0;
        }

        .description {
            font-size: 1rem;
            line-height: 1.6;
            opacity: 0.8;
            max-width: 400px;
        }

        .login-card {
            flex: 0 0 380px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            border-radius: 15px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        .login-card h2 {
            font-size: 2.2rem;
            margin-bottom: 30px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 30px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            outline: none;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                text-align: center;
            }
            .welcome-text {
                padding-right: 0;
                margin-bottom: 40px;
                align-items: center;
            }
            .login-card {
                flex: 1;
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="welcome-text">
            <div class="logo">WildMeow 🐾</div>
            <h1>Welcome!</h1>
            <div class="line"></div>
            <p class="description">
                The ultimate student companion. Log in to <b>view your grades</b>,
                <b>add new records</b>, and manage your <b>student profile</b> with ease.
            </p>
        </div>

        <div class="login-card">
            <h2>Sign in</h2>

            {% if error %}
            <p style="color: #ffcccc; background: rgba(255,0,0,0.2); padding: 10px; border-radius: 5px; text-align: center; margin-bottom: 15px; font-size: 0.8rem;">
                {{ error }}
            </p>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="input-group">
                    <label>User Name</label>
                    <input type="text" name="username" placeholder="Username" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Password" required>
                </div>

                <button type="submit" class="btn-submit">Submit</button>
            </form>
            
        </div>
    </div>

</body>
</html>

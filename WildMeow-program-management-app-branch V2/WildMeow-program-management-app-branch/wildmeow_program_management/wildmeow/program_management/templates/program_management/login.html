<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WildMeow – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161b24;
      --surface2: #1e2535;
      --accent: #f4a144;
      --green: #4ecb8d;
      --text: #e8eaf0;
      --muted: #6b7590;
      --border: rgba(255,255,255,0.07);
      --error: #e05c5c;
      --radius: 14px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    /* Background glow effects */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(244,161,68,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(78,203,141,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    /* Logo */
    .logo-area {
      text-align: center;
      margin-bottom: 36px;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -1px;
    }
    .logo span { color: var(--accent); }
    .logo-sub {
      font-size: 0.72rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
    }

    /* Card */
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .card-sub {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* Messages */
    .messages { margin-bottom: 20px; }
    .msg {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 8px;
    }
    .msg-error { background: rgba(224,92,92,0.15); color: var(--error); border: 1px solid rgba(224,92,92,0.3); }
    .msg-success { background: rgba(78,203,141,0.15); color: var(--green); border: 1px solid rgba(78,203,141,0.3); }

    /* Form */
    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .form-control {
      width: 100%;
      padding: 13px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-control:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(244,161,68,0.15);
    }
    .form-control::placeholder { color: var(--muted); }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #0d0f14;
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .btn-login:hover {
      background: #f5b05e;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(244,161,68,0.25);
    }

    .footer-note {
      text-align: center;
      margin-top: 24px;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .footer-note strong { color: var(--accent); }
  </style>
</head>
<body>

<div class="login-wrapper">
  <div class="logo-area">
    <div class="logo">WILD<span>MEOW</span></div>
    <div class="logo-sub">Program Management App</div>
  </div>

  <div class="login-card">
    <div class="card-title">Welcome back 👋</div>
    <div class="card-sub">Sign in to manage programs and semesters.</div>

    {% if messages %}
    <div class="messages">
      {% for message in messages %}
        <div class="msg {% if message.tags == 'error' %}msg-error{% else %}msg-success{% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    </div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}

      <div class="form-group">
        <label for="id_username">Username</label>
        <input
          type="text"
          name="username"
          id="id_username"
          class="form-control"
          placeholder="Enter your username"
          autofocus
          required
        />
      </div>

      <div class="form-group">
        <label for="id_password">Password</label>
        <input
          type="password"
          name="password"
          id="id_password"
          class="form-control"
          placeholder="Enter your password"
          required
        />
      </div>

      <button type="submit" class="btn-login">Sign In</button>
    </form>
  </div>

  <div class="footer-note">
    <strong>WildMeow</strong> · Kim Joshua C. Paltinga
  </div>
</div>

</body>
</html>

<html>
<head><title>WildMeow Dashboard</title></head>
<body>
<h1>Dashboard</h1>

{% endfor %}
</ul>

<h2>Departments</h2>

{% for dept in departments %}
<li>{{ dept.Dept_Name }}</li>
{% endfor %}
</ul>
</body>
</html>

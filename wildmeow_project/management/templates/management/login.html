{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login - WildMeow</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #ffffff; padding: 40px; border-radius: 12px; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 5px solid #8A252C; text-align: center; }
        .logo-img { width: 100px; margin-bottom: 20px; }
        h2 { text-align: center; margin-bottom: 25px; color: #8A252C; font-weight: 700; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #D0CBCC; background: #fff; color: #333; box-sizing: border-box; transition: border-color 0.3s; text-align: left; }
        input:focus { outline: none; border-color: #F6C311; }
        button { width: 100%; padding: 12px; border-radius: 6px; border: none; background: #8A252C; color: #fff; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #6a1c22; }
        .error { color: #dc3545; font-size: 0.85em; margin-bottom: 10px; text-align: center; background: #f8d7da; padding: 8px; border-radius: 4px; }
        .success { color: #28a745; font-size: 0.85em; margin-bottom: 10px; text-align: center; background: #d4edda; padding: 8px; border-radius: 4px; }
        .register-link { text-align: center; margin-top: 20px; font-size: 0.9em; color: #666; }
        .register-link a { color: #8A252C; text-decoration: none; font-weight: 600; }
        .register-link a:hover { color: #F6C311; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="{% static 'CIT_logo.png' %}" alt="Logo" class="logo-img">
        <h2>WildMeow Login</h2>
        {% if messages %}
            {% for message in messages %}
                <div class="{% if message.tags == 'success' %}success{% else %}error{% endif %}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
        <div class="register-link">
            Don't have an account? <a href="{% url 'register' %}">Sign Up</a>
        </div>
    </div>
</body>
</html>

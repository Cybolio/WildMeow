<!DOCTYPE html>
<html>
<head>
    <title>Register - WildMeow</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .register-card { background: #ffffff; padding: 40px; border-radius: 12px; width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 5px solid #F6C311; }
        h2 { text-align: center; margin-bottom: 25px; color: #8A252C; font-weight: 700; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9em; color: #666; }
        input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #D0CBCC; background: #fff; color: #333; box-sizing: border-box; }
        input:focus { outline: none; border-color: #8A252C; }
        button { width: 100%; padding: 12px; border-radius: 6px; border: none; background: #F6C311; color: #8A252C; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background: #e5b50f; }
        .error { color: #dc3545; font-size: 0.8em; margin-top: 5px; }
        .login-link { text-align: center; margin-top: 20px; font-size: 0.9em; color: #666; }
        .login-link a { color: #8A252C; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="register-card">
        <h2>Create Account</h2>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    <label>{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="error">{{ field.errors|striptags }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit">Register Now</button>
        </form>
        <div class="login-link">
            Already have an account? <a href="{% url 'login' %}">Log In</a>
        </div>
    </div>
</body>
</html>
